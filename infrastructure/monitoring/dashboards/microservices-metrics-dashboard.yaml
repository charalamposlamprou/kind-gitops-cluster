apiVersion: v1
kind: ConfigMap
metadata:
  name: microservices-metrics-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Microservices"
data:
  microservices-metrics.json: |
    {
      "title": "Microservices - Metrics",
      "uid": "microservices-metrics",
      "schemaVersion": 39,
      "version": 1,
      "tags": ["microservices", "prometheus"],
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "label": "Data Source",
            "hide": 2,
            "current": {}
          },
          {
            "name": "service",
            "type": "custom",
            "label": "Service",
            "query": "microservice-a,microservice-b",
            "includeAll": true,
            "allValue": "microservice-a|microservice-b",
            "current": { "text": "All", "value": "$__all" },
            "options": [
              { "selected": true,  "text": "All",            "value": "$__all" },
              { "selected": false, "text": "microservice-a", "value": "microservice-a" },
              { "selected": false, "text": "microservice-b", "value": "microservice-b" }
            ],
            "multi": false,
            "hide": 0,
            "skipUrlSync": false
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Running Pods",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_status_phase{namespace=\"apps\", pod=~\"($service).*\", phase=\"Running\"}) or vector(0)",
              "legendFormat": "Running"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",   "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Container Restarts (24h)",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"apps\", pod=~\"($service).*\"}[24h])) or vector(0)",
              "legendFormat": "Restarts"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green",  "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red",    "value": 5 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "CPU Usage",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"apps\", container=\"node-app\", pod=~\"($service).*\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": { "lineWidth": 2, "fillOpacity": 5 }
            }
          },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 4,
          "title": "Memory Usage",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(container_memory_working_set_bytes{namespace=\"apps\", container=\"node-app\", pod=~\"($service).*\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "lineWidth": 2, "fillOpacity": 5 }
            }
          },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 5,
          "title": "Network I/O",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 12 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_network_receive_bytes_total{namespace=\"apps\", pod=~\"($service).*\"}[5m])) by (pod)",
              "legendFormat": "{{pod}} RX"
            },
            {
              "refId": "B",
              "expr": "sum(rate(container_network_transmit_bytes_total{namespace=\"apps\", pod=~\"($service).*\"}[5m])) by (pod)",
              "legendFormat": "{{pod}} TX"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "lineWidth": 2, "fillOpacity": 5 }
            }
          },
          "options": { "tooltip": { "mode": "multi" } }
        }
      ]
    }
