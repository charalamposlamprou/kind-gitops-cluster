apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: microservice-a
  namespace: apps
spec:
  replicas: 2
  strategy:
    blueGreen:
      activeService: service-a
      previewService: service-a-preview
  selector:
    matchLabels:
      app: microservice-a
      app.kubernetes.io/name: microservice-a
      app.kubernetes.io/part-of: microservices
  template:
    metadata:
      labels:
        app: microservice-a
        app.kubernetes.io/name: microservice-a
        app.kubernetes.io/part-of: microservices
    spec:
      containers:
        - name: node-app
          image: node:20-alpine
          workingDir: /app
          command: ["sh", "-c"]
          args:
            - npm install --omit=dev && node -r ./otel.js app.js
          ports:
            - name: http
              containerPort: 80
          env:
            - name: OTEL_SERVICE_NAME
              value: microservice-a
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.monitoring.svc.cluster.local:4318
            - name: SERVICE_B_URL
              value: http://service-b.apps.svc.cluster.local/
          volumeMounts:
            - name: app-config
              mountPath: /app/app.js
              subPath: app.js
            - name: app-config
              mountPath: /app/package.json
              subPath: package.json
            - name: app-config
              mountPath: /app/otel.js
              subPath: otel.js
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 256Mi
      volumes:
        - name: app-config
          configMap:
            name: microservice-a-app
            items:
              - key: app.js
                path: app.js
              - key: package.json
                path: package.json
              - key: otel.js
                path: otel.js
