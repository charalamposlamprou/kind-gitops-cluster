apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.89.0
    helm:
      releaseName: otel-collector
      values: |
        mode: daemonset
        fullnameOverride: otel-collector
        image:
          repository: otel/opentelemetry-collector-contrib
        presets:
          kubernetesAttributes:
            enabled: true
        extraVolumes:
          - name: varlogpods
            hostPath:
              path: /var/log/pods
          - name: varlibdockercontainers
            hostPath:
              path: /var/lib/docker/containers
        extraVolumeMounts:
          - name: varlogpods
            mountPath: /var/log/pods
            readOnly: true
          - name: varlibdockercontainers
            mountPath: /var/lib/docker/containers
            readOnly: true
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
            filelog:
              include:
                - /var/log/pods/*/*/*.log
              exclude:
                - /var/log/pods/monitoring_otel-collector*_*/otel-collector/*.log
              include_file_path: true
              start_at: end
              operators:
                - type: regex_parser
                  id: parser-containerd
                  regex: '^(?P<time>[^ ^Z]+Z) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) (?P<log>.*)$'
                  timestamp:
                    parse_from: attributes.time
                    layout: '%Y-%m-%dT%H:%M:%S.%LZ'
                - type: move
                  from: attributes.stream
                  to: attributes["log.iostream"]
                - type: move
                  from: attributes.log
                  to: body
                - type: regex_parser
                  id: extract-metadata-from-filepath
                  parse_from: attributes["log.file.path"]
                  regex: '^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9\-]{36})\/(?P<container_name>[^\._]+)\/(?P<restart_count>\d+)\.log$'
                - type: regex_parser
                  id: extract-service-name
                  parse_from: attributes.pod_name
                  regex: '^(?P<service_name>.+?)(?:-[a-z0-9]+-[a-z0-9]+)?$'
                  if: 'attributes.namespace == "apps"'
                - type: move
                  from: attributes.namespace
                  to: resource["k8s.namespace.name"]
                - type: move
                  from: attributes.pod_name
                  to: resource["k8s.pod.name"]
                - type: move
                  from: attributes.uid
                  to: resource["k8s.pod.uid"]
                - type: move
                  from: attributes.container_name
                  to: resource["k8s.container.name"]
                - type: move
                  from: attributes.restart_count
                  to: resource["k8s.container.restart_count"]
                - type: move
                  from: attributes.service_name
                  to: resource["service.name"]
          processors:
            memory_limiter:
              check_interval: 5s
              limit_mib: 256
              spike_limit_mib: 64
            batch: {}
            resource/loki:
              attributes:
                - action: insert
                  key: loki.resource.labels
                  value: service.name, k8s.namespace.name, k8s.pod.name, k8s.container.name
          exporters:
            otlp/tempo:
              endpoint: tempo.monitoring.svc.cluster.local:4317
              tls:
                insecure: true
            loki:
              endpoint: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
            prometheus:
              endpoint: 0.0.0.0:8889
          service:
            pipelines:
              traces:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [otlp/tempo]
              logs:
                receivers: [otlp, filelog]
                processors: [memory_limiter, resource/loki, batch]
                exporters: [loki]
              metrics:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [prometheus]
        service:
          enabled: true
          type: ClusterIP
        ports:
          metrics:
            enabled: true
            containerPort: 8889
            servicePort: 8889
            protocol: TCP
        podMonitor:
          enabled: true
          extraLabels:
            release: monitoring
          metricsEndpoints:
            - port: metrics
              path: /metrics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
