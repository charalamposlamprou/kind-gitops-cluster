apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo
    targetRevision: 1.10.1
    helm:
      releaseName: tempo
      values: |
        tempo:
          retention: 24h
        persistence:
          enabled: false
        service:
          type: ClusterIP
        ingress:
          enabled: false
        traces:
          otlp:
            grpc:
              enabled: true
            http:
              enabled: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
