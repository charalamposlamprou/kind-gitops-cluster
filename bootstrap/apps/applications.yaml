apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-app
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/charalamposlamprou/kind-gitops-cluster.git
    targetRevision: HEAD
    path: applications
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
