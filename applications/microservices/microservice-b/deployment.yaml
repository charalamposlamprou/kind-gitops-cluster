apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: microservice-b
  namespace: apps
spec:
  replicas: 2
  strategy:
    blueGreen:
      activeService: service-b
      previewService: service-b-preview
  selector:
    matchLabels:
      app: microservice-b
      app.kubernetes.io/name: microservice-b
      app.kubernetes.io/part-of: microservices
  template:
    metadata:
      labels:
        app: microservice-b
        app.kubernetes.io/name: microservice-b
        app.kubernetes.io/part-of: microservices
    spec:
      containers:
        - name: node-app
          image: node:20-alpine
          workingDir: /app
          command: ["node", "app.js"]
          ports:
            - name: http
              containerPort: 80
          env:
            - name: OTEL_SERVICE_NAME
              value: microservice-b
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.monitoring.svc.cluster.local:4318
          volumeMounts:
            - name: app-config
              mountPath: /app/app.js
              subPath: app.js
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 256Mi
      volumes:
        - name: app-config
          configMap:
            name: microservice-b-app
            items:
              - key: app.js
                path: app.js
