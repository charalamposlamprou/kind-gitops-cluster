apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 70.0.0
    helm:
      skipCrds: true
      releaseName: monitoring
      values: |
        grafana:
          adminPassword: admin
          additionalDataSources:
            - name: Loki
              uid: loki
              type: loki
              access: proxy
              url: http://loki.monitoring.svc.cluster.local:3100
              isDefault: false
              jsonData:
                maxLines: 1000
            - name: Tempo
              uid: tempo
              type: tempo
              access: proxy
              url: http://tempo.monitoring.svc.cluster.local:3100
              isDefault: false
              jsonData:
                httpMethod: GET
                serviceMap:
                  datasourceUid: prometheus
                tracesToLogsV2:
                  datasourceUid: loki
                  spanStartTimeShift: -10m
                  spanEndTimeShift: 10m
                  tags:
                    - key: service.name
                      value: service
                tracesToMetrics:
                  datasourceUid: prometheus
                  tags:
                    - key: service.name
                      value: service
                  queries:
                    - name: Request rate
                      query: sum(rate(http_server_duration_milliseconds_count{$$__tags}[5m]))
                nodeGraph:
                  enabled: true
          service:
            type: ClusterIP
          ingress:
            enabled: false
        kubeControllerManager:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeProxy:
          enabled: false
        kubeScheduler:
          enabled: false
        kube-state-metrics:
          prometheus:
            monitor:
              # Avoid ArgoCD app-instance label rewrite mismatch (monitoring vs monitoring-stack).
              selectorOverride:
                matchLabels:
                  release: monitoring
                  app.kubernetes.io/name: kube-state-metrics
        prometheus:
          prometheusSpec:
            enableFeatures:
              - exemplar-storage
          service:
            type: ClusterIP
          ingress:
            enabled: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
