apiVersion: v1
kind: ConfigMap
metadata:
  name: microservice-b-app
  namespace: apps
data:
  app.js: |
    const http = require("http");

    const port = Number(process.env.PORT || 80);
    const serviceName = process.env.OTEL_SERVICE_NAME || "microservice-b";

    const server = http.createServer(async (req, res) => {
      if (req.url === "/healthz") {
        res.writeHead(200, { "Content-Type": "application/json" });
        res.end(JSON.stringify({ status: "ok", service: "microservice-b" }));
        return;
      }

      try {
        res.writeHead(200, { "Content-Type": "application/json" });
        res.end(
          JSON.stringify({
            service: "microservice-b",
            path: req.url,
            message: "hello from node",
            timestamp: new Date().toISOString(),
          })
        );
      } catch (err) {
        if (!res.headersSent) {
          res.writeHead(500, { "Content-Type": "application/json" });
          res.end(JSON.stringify({ service: "microservice-b", error: err.message }));
        }
        console.error(JSON.stringify({ service: serviceName, error: err.message, path: req.url || "/", timestamp: new Date().toISOString() }));
      }
    });

    server.listen(port, () => {
      console.log(`microservice-b listening on ${port}`);
    });
